    <title>AutoSuggest</title>
    <link rel="stylesheet" href="../css/AutoSuggest.css">
</head>
<body>

    <div class="status-bar">
        <span class="gear" aria-label="Settings">&#x2699;</span>

            <span> Online</span>

    <h1 id = "name"><span class = "being"> Auto</span>Suggest</h1>

    <div class="search-container">
        <span class= "lens" >&#x1F50D;</span>
        <input  class = "search-box" type = "text" placeholder="Start typing to search...">
        <div id = "search-suggestions">
            
        </div>
    </div>
